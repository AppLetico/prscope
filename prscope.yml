# Prscope Configuration
# Planning-first workflow with upstream PR inputs

# Local repository to profile and compare against upstream PRs
local_repo: ~/workspace/prscope

# Project context (optional - README is used automatically if not provided)
# project:
#   name: My Project
#   description: |
#     Override description here if README is not sufficient.
#     The LLM will use this instead of the README.

# Upstream repositories to monitor
upstream:
  - repo: openclaw/openclaw

# Sync settings (handles repos with 1000s of PRs)
sync:
  state: merged       # Only look at merged PRs
  max_prs: 10          # Max PRs to fetch per sync (set to 3 for testing)
  fetch_files: true   # Needed for path matching
  since: 90d          # Initial window: last 90 days
  incremental: true   # Only fetch new PRs after first sync
  eval_batch_size: 3  # Max PRs to evaluate per run (set to 3 for testing)

# Scoring thresholds
scoring:
  min_rule_score: 0.3
  min_final_score: 0.5
  keyword_weight: 0.4
  path_weight: 0.6

# LLM configuration (RECOMMENDED for high-quality results)
# Without upstream_eval: rule-based only (more noise)
# With upstream_eval: semantic analysis + "already implemented" detection
upstream_eval:
  enabled: true      # Set to true and add OPENAI_API_KEY to .env
  model: gpt-4o
  temperature: 0.2
  max_tokens: 3000

# Planning mode (Author + Critic)
# author_model / critic_model / memory_model can be any LiteLLM-supported model.
# memory_model: used only for "Preparing codebase memory"; defaults to author_model if omitted.
# Only set ANTHROPIC_API_KEY if you use a Claude model here.
planning:
  # author_model: gpt-4o-mini    # drafts + discovery (default)
  # critic_model: gpt-4o-mini    # critic (default)
  # memory_model: gpt-4o-mini    # optional; codebase memory build (defaults to author_model)
  author_call_timeout_seconds: 50
  memory_prep_timeout_seconds: 120
  initial_draft_timeout_seconds: 45
  max_adversarial_rounds: 10
  convergence_threshold: 0.05
  output_dir: ./plans
  require_verified_file_references: false
  discovery_tool_rounds: 25        # codebase tool calls during discovery (like Cursor plan mode)
  author_tool_rounds: 25           # codebase tool calls during plan drafting/refinement
